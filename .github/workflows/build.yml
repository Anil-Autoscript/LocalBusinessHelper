name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'

jobs:
  # ─── Build Debug APK ───────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'debug')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Bootstrap Gradle wrapper jar
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version=8.4 --distribution-type=bin
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─── Build Release APK ─────────────────────────────────────────────────────
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'release')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Bootstrap Gradle wrapper jar
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version=8.4 --distribution-type=bin
          fi

      # Decode keystore BEFORE the build so release.keystore exists when Gradle reads it
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            echo "✅ Keystore decoded — APK will be signed"
          else
            echo "⚠️  KEYSTORE_BASE64 secret not set — APK will be UNSIGNED"
            echo "    Add secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Verify APK is signed
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          # Check APK has a valid signature
          $JAVA_HOME/bin/jarsigner -verify "$APK" && echo "✅ APK is signed" || echo "⚠️  APK is unsigned"

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_DIR="app/build/outputs/apk/release"
          for apk in "$APK_DIR"/*.apk; do
            [ -f "$apk" ] && mv "$apk" "$APK_DIR/LocalBusinessHelper-v${{ steps.version.outputs.name }}.apk"
          done
          ls -lh "$APK_DIR"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.version.outputs.name }}-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Local Business Helper ${{ github.ref_name }}"
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            ## Local Business Helper ${{ github.ref_name }}

            ### Installation
            1. Download LocalBusinessHelper-${{ github.ref_name }}.apk below
            2. Android Settings > Security > Enable "Install unknown apps"
            3. Open the APK to install

            ### Requirements
            - Android 7.0+ (API 24+)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Validate Project Files ────────────────────────────────────────────────
  validate:
    name: Validate Project Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Check critical project files
        run: |
          test -f build.gradle                             && echo "OK build.gradle"
          test -f settings.gradle                          && echo "OK settings.gradle"
          test -f app/build.gradle                         && echo "OK app/build.gradle"
          test -f app/proguard-rules.pro                   && echo "OK proguard-rules.pro"
          test -f app/src/main/AndroidManifest.xml         && echo "OK AndroidManifest.xml"
          test -f gradle/wrapper/gradle-wrapper.properties && echo "OK gradle-wrapper.properties"
